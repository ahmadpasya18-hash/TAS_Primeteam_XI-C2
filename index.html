<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>App Mitra & Produk</title>
  <link rel="stylesheet" href="CSS/styles.css" />
</head>
<body>
  <div id="app">
    <header id="header">
      <div class="header-content">
        <h1 id="header-title"></h1>
        <div id="header-indicator" class="header-indicator"></div>
      </div>
    </header>
    <main id="view"></main>
    <nav class="bottom-nav" id="bottomNav">
      <button data-route="home" class="nav-btn active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
        </svg>
        Home
      </button>
      <button data-route="mitra" class="nav-btn">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M7 4V2C7 1.45 7.45 1 8 1h8c.55 0 1 .45 1 1v2h4c.55 0 1 .45 1 1s-.45 1-1 1h-1v13c0 1.1-.9 2-2 2H6c-1.1 0-2-.9-2-2V6H3c-.55 0-1-.45-1-1s.45-1 1-1h4zM9 3v1h6V3H9z"/>
        </svg>
        Mitra
      </button>
      <button data-route="produk" class="nav-btn">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M20 7h-4V4c0-1.1-.9-2-2-2H6c-1.1 0-2 .9-2 2v3H0v2h2v11c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V9c1.1 0 2-.9 2-2V7h-2zm-6 0H6V4h8v3z"/>
        </svg>
        Produk
      </button>
      <button data-route="akun" class="nav-btn">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
        </svg>
        Akun
      </button>
    </nav>
  </div>
  <script src="JS/app.js"></script>
</body>
</html>
