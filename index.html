<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>App Mitra & Produk</title>
  <link rel="stylesheet" href="CSS/styles.css" />
</head>
<body>
  <div id="app">
    <header id="header">
      <div class="header-content">
        <h1 id="header-title"></h1>
        <div id="header-indicator" class="header-indicator"></div>
      </div>
    </header>
    <main id="view"></main>
    <nav class="bottom-nav" id="bottomNav">
      <button data-route="beranda" class="nav-btn active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
        </svg>
        Beranda
      </button>
      <button data-route="keranjang" class="nav-btn">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zm0-2h14V6H5.21l-.94-2H1v2h2l3.6 7.59-1.35 2.44C4.52 16.37 5.48 18 7 18zm10 2c-1.1 0-1.99.9-1.99 2S15.9 22 17 22s2-.9 2-2-.9-2-2-2z"/>
        </svg>
        Keranjang
      </button>
      <button data-route="riwayat" class="nav-btn">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M13 3a9 9 0 1 0 9 9h-2a7 7 0 1 1-7-7V3zm-1 5h2v6l5.25 3.15-.75 1.23L12 14V8z"/>
        </svg>
        Riwayat
      </button>
      <button data-route="profile" class="nav-btn">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
        </svg>
        Profile
      </button>
    </nav>
  </div>
  <script src="JS/app.js"></script>
</body>
</html>
